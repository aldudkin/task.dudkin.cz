# Loki microservices config — SHARED by all component services.
# Each ECS service runs this SAME file but with a different -target flag
# (distributor | ingester | query-frontend | query-scheduler | querier | index-gateway | compactor).
# Storage: S3 for chunks + TSDB index. Auth via the ECS task role (NO access keys).
# Docs: https://grafana.com/docs/loki/latest/get-started/deployment-modes/#microservices-mode

auth_enabled: false

server:
  http_listen_port: 3100 # HTTP; dns://// must match security group config
  grpc_listen_port: 9095 # gRPC; how components call each other (MANDATORY, separate processes)
  log_level: info

common:
  path_prefix: /loki # local scratch dir inside each container
  replication_factor: 1 # single ingester instance → one copy
  ring:
    kvstore:
      store: memberlist # all components share one gossip ring
  storage:
    s3:
      bucketnames: loki-data-366112400496-eu-central-1 # TODO: fix hardcoded bucket name
      region: eu-central-1
      s3forcepathstyle: false # virtual-hosted-style URLs (AWS default)
  # Everyone reaches the compactor's delete API here.
  # Must not be scaled: https://grafana.com/docs/loki/latest/operations/storage/retention/#compactor
  compactor_address: http://loki-compactor.loki.internal:3100

# "dns+" resolves the name to ALL current IPs behind it (scaling-safe).
memberlist:
  join_members:
    - dns+loki-ingester.loki.internal:7946
    - dns+loki-distributor.loki.internal:7946

schema_config:
  configs:
    - from: 2020-05-15
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h # hard tsdb requirement

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index # local dir for the index being written
    cache_location: /loki/tsdb-cache # local cache of index files pulled from S3
    # queriers/ingesters ask the index-gateway service for the index (its own process now).
    index_gateway_client:
      # Plain host:port. These gRPC client addrs use Loki's own DNS watcher,
      # NOT dns:/// (gRPC) nor dns+ (dskit) — both are rejected here.
      server_address: loki-index-gateway.loki.internal:9095

# Plain host:port: the worker periodically re-resolves this to ALL scheduler
# A records and connects to each, so it scales to >1 with no prefix needed.
frontend:
  scheduler_address: loki-query-scheduler.loki.internal:9095
frontend_worker:
  scheduler_address: loki-query-scheduler.loki.internal:9095

# Single index-gateway (the loki-index-gateway service runs with -target=index-gateway).
index_gateway:
  mode: simple

compactor:
  working_directory: /loki/compactor
  delete_request_store: s3

limits_config:
  reject_old_samples: true # drop logs timestamped far in the past
  reject_old_samples_max_age: 168h

analytics:
  reporting_enabled: false
